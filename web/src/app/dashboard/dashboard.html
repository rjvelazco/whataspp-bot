<p-toast />
<p-confirmdialog />

<div class="admin">
  <aside class="sidebar">
    <div class="brand"><i class="pi pi-shop"></i> Store Bot</div>

    <nav class="nav">
      <span class="nav-item"><i class="pi pi-comments"></i> Chats</span>
      <a class="nav-item clickable" routerLink="pagos" routerLinkActive="active">
        <i class="pi pi-wallet"></i> Pagos
        @if (store.pendingVerify() > 0) { <span class="pill warn">{{ store.pendingVerify() }}</span> }
      </a>
      <a class="nav-item clickable" routerLink="pedidos" routerLinkActive="active">
        <i class="pi pi-shopping-bag"></i> Pedidos
        @if (store.toShip() > 0) { <span class="pill info">{{ store.toShip() }}</span> }
      </a>
      <a class="nav-item clickable" routerLink="recursos" routerLinkActive="active">
        <i class="pi pi-folder-open"></i> Recursos
      </a>
      <span class="nav-item"><i class="pi pi-exclamation-circle"></i> Atención</span>
      <span class="nav-item"><i class="pi pi-cog"></i> Configuración</span>
    </nav>

    <div class="conn" [class.ok]="connected()">
      <span class="dot"></span>{{ connected() ? 'Conectado' : 'Desconectado' }}
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
